# ARMSX2 GameDB overrides — layered on top of upstream GameIndex.yaml
# after it loads. Entries here either add NEW serials upstream doesn't
# cover, or PARTIAL-override existing upstream entries: scalar fields
# (compat, eeRoundMode, ...) replace upstream when present; list fields
# (gameFixes, speedHacks, gsHWFixes, memcardFilters, patches, dynaPatches)
# REPLACE upstream's list when specified — they don't append. Omit a
# field to inherit it from upstream.
#
# Use cases for this file:
#   - Mobile-GPU-specific GS hardware fixes (Mali / Adreno / PowerVR
#     quirks that don't apply on desktop and shouldn't go upstream)
#   - ARMSX2 speedhack defaults known to be safe per-title
#   - New serials missing from upstream's GameIndex.yaml
#
# Format mirrors upstream GameIndex.yaml exactly. Example:
#
# SLUS-12345:
#   name: "Example Game"
#   speedHacks:
#     mtvuHack: 1
#   gsHWFixes:
#     mipmap: 2
#     halfPixelOffset: 1
#
# Leave this file empty (just comments) when no overrides are needed.
